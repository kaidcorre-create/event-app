<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seat Counter</title>
    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #e5255e; font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        .card {
            position: relative;
            width: calc(100vw - 40px); 
            max-width: 280px; 
            padding: 30px 20px;
            background: white; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-height: 320px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            /* Scale down slightly to ensure it doesn't hit top/bottom */
            transform: scale(0.98); 
        }

        .refresh-container {
            position: absolute; top: 15px; right: 20px;
            text-align: center; cursor: pointer; color: #666; z-index: 10;
        }
        .refresh-icon { font-size: 1.2rem; display: inline-block; }
        .refresh-text { font-size: 0.5rem; text-transform: uppercase; line-height: 1; display: block; margin-top: 2px; }

      
        #splashArea { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .splash-icon {
            font-size: 2.2rem; background: #fdf2f5; width: 70px; height: 70px;
            line-height: 70px; border-radius: 50%; color: #e5255e;
        }
        .splash-title { font-size: 1.1rem; font-weight: 800; color: #333; margin: 5px 0 0 0; }
        .splash-sub { font-size: 0.8rem; color: #777; margin-bottom: 5px; line-height: 1.2; }
        
        #splashBtn { 
            background: #e5255e; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 15px; font-size: 1rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 4px 0 #b01a46; 
        }

     
        #num { font-size: 4.5rem; font-weight: 900; color: #e5255e; margin: 0; line-height: 1; }
        .text { font-size: 0.8rem; color: #333; font-weight: bold; text-transform: uppercase; margin: 5px 0 15px 0; }
        
        input {
            width: 90%; padding: 10px; margin-bottom: 10px;
            border: 2px solid #eee; border-radius: 10px;
            font-size: 1.1rem; text-align: center; letter-spacing: 3px; background: #f9f9f9;
        }
        button {
            background: #ffc72e; color: #000; border: none; padding: 15px; 
            width: 100%; border-radius: 15px; font-size: 1rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 4px 0 #d4a526; transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d4a526; }

        
        .success-checkmark { width: 60px; height: 60px; margin: 0 auto 10px; position: relative; }
        .check-icon {
            width: 60px; height: 60px; position: relative;
            border-radius: 50%; border: 4px solid #4CAF50; box-sizing: border-box;
        }
        .check-icon::after {
            content: ''; position: absolute; top: 30px; left: 13px;
            width: 12px; height: 25px;
            border-right: 5px solid #4CAF50; border-bottom: 5px solid #4CAF50;
            transform: rotate(45deg); transform-origin: left top;
            animation: check-draw 0.5s ease forwards;
        }
        @keyframes check-draw {
            0% { height: 0; width: 0; }
            40% { height: 0; width: 12px; }
            100% { height: 25px; width: 12px; }
        }
    </style>
</head>
<body>

<div class="card" id="cardContent">
    <div class="refresh-container" id="refreshUI" style="display:none;" onclick="refresh()">
        <span class="refresh-icon">↻</span>
        <span class="refresh-text">Refresh</span>
    </div>

    <div id="splashArea">
        <div class="splash-icon">💺</div>
        <h2 class="splash-title">Workshop Seats</h2>
        <p class="splash-sub">Tap to view live availability</p>
        <button id="splashBtn" onclick="initApp()">SHOW LIVE SEATS</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div id="num">--</div>
        <div class="text">Seats Available</div>
        
        <div id="entryArea">
            <input type="number" id="pinInput" placeholder="PIN">
            <button id="btn" onclick="updateSeat(-1)">I'M IN THE ROOM</button>
        </div>

        <div id="successArea" style="display:none;">
            <div class="success-checkmark"><div class="check-icon"></div></div>
            <div style="color: #28a745; font-weight: bold; margin-bottom: 15px; font-size: 0.85rem;">CHECKED IN</div>
            <button id="leaveBtn" style="background: #333; color: white; box-shadow: 0 4px 0 #000; padding: 12px;" onclick="updateSeat(1)">LEAVE ROOM</button>
        </div>
    </div>
    <div id="errorMsg" style="color: red; font-size: 0.7rem; margin-top: 8px; height: 1em;"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const roomID = params.get('room'); 
    const pinMapping = { 'Room1': '0412', 'Room2': '9876', 'Room3': '3314', 'Room4': '4063' };
    const baseRoom = roomID ? roomID.split('_')[0] : null;
    const workerUrl = `https://seat-counter.kai-d-corre-ea2.workers.dev/?room=${roomID}`;

    function initApp() {
        document.getElementById('splashArea').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('refreshUI').style.display = 'block';
        if (localStorage.getItem('checkedIn_' + roomID)) { setUI(true); } else { setUI(false); }
        refresh();
    }

    function setUI(checkedIn) {
        document.getElementById('entryArea').style.display = checkedIn ? 'none' : 'block';
        document.getElementById('successArea').style.display = checkedIn ? 'block' : 'none';
        document.getElementById('errorMsg').innerText = "";
    }

    async function refresh() {
        const numEl = document.getElementById('num');
        const iconEl = document.querySelector('.refresh-icon');
        if(document.getElementById('mainApp').style.display === 'none' || !roomID) return;
        iconEl.style.transition = "transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
        iconEl.style.transform = "rotate(360deg)";
        try {
            const res = await fetch(workerUrl);
            const data = await res.json();
            numEl.innerText = data.count;
        } catch(e) { console.log("Sync..."); }
        finally {
            setTimeout(() => {
                iconEl.style.transition = "none";
                iconEl.style.transform = "rotate(0deg)";
            }, 600);
        }
    }

    async function updateSeat(delta) {
        const pinInput = document.getElementById('pinInput').value;
        const errorMsg = document.getElementById('errorMsg');
        if (delta === -1 && pinInput !== pinMapping[baseRoom]) { errorMsg.innerText = "Invalid PIN"; return; }
        try {
            const response = await fetch(workerUrl, { 
                method: 'POST',
                body: JSON.stringify({ change: delta }),
                headers: { 'Content-Type': 'application/json' }
            });
            if (response.ok) {
                const data = await response.json();
                document.getElementById('num').innerText = data.count;
                if (delta === -1) { localStorage.setItem('checkedIn_' + roomID, 'true'); setUI(true); }
                else { localStorage.removeItem('checkedIn_' + roomID); setUI(false); }
            }
        } catch(e) { errorMsg.innerText = "Error updating"; }
    }

    if (localStorage.getItem('checkedIn_' + roomID)) { initApp(); }
    window.addEventListener('focus', refresh);
</script>

</body>
</html>
