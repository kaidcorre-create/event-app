<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Counter</title>
    <style>
        /* This section controls the look */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: white; font-family: sans-serif;
        }
        .card {
            width: 90%; max-width: 350px; padding: 30px;
            border: 3px solid #007bff; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #num { font-size: 5rem; font-weight: bold; color: #007bff; margin: 0; }
        .text { font-size: 1.2rem; color: #555; text-transform: uppercase; margin-bottom: 20px; }
        button {
            background: #28a745; color: white; border: none;
            padding: 20px; width: 100%; border-radius: 12px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer;
        }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="card">
        <div id="num">--</div>
        <div class="text">Seats Left</div>
        <button id="btn" onclick="checkIn()">I'm in the Room!</button>
    </div>

    <script>
        // REPLACE THE URL BELOW WITH YOUR CLOUDFLARE WORKER URL
        const workerUrl = 'seat-counter.kai-d-corre-ea2.workers.dev
';

        async function refresh() {
            try {
                const res = await fetch(workerUrl);
                const val = await res.text();
                document.getElementById('num').innerText = val;
                if(parseInt(val) <= 0) {
                    document.getElementById('btn').disabled = true;
                    document.getElementById('btn').innerText = "Full";
                }
            } catch(e) { console.log("Syncing..."); }
        }

        async function checkIn() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "Saving...";
            await fetch(workerUrl, { method: 'POST' });
            btn.innerText = "Confirmed!";
            refresh();
        }

        // Run once on start and then every 15 seconds
        refresh();
        setInterval(refresh, 15000);
    </script>
</body>
</html>
