<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seat Counter</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #e5255e; font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }
        .card {
            width: 85%; max-width: 300px; padding: 25px;
            background: white; border-radius: 24px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        #num { font-size: 5rem; font-weight: 900; color: #e5255e; margin: 0; line-height: 1; }
        .text { font-size: 0.9rem; color: #333; font-weight: bold; text-transform: uppercase; margin: 10px 0 15px 0; }
        input {
            width: 80%; padding: 12px; margin-bottom: 15px;
            border: 2px solid #ddd; border-radius: 10px;
            font-size: 1.2rem; text-align: center; letter-spacing: 4px;
        }
        button {
            background: #ffc72e; color: #000; border: none; padding: 18px; 
            width: 100%; border-radius: 14px; font-size: 1.1rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 4px 0 #d4a526;
        }
        button:disabled { background: #e0e0e0; color: #999; box-shadow: none; }
        .success { color: #28a745; font-size: 1.2rem; font-weight: bold; }
        .tick { font-size: 4rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

   <div class="card" id="cardContent">
    <div id="num">--</div>
    <div class="text">Seats Available</div>
    
    <div id="entryArea">
        <input type="number" id="pinInput" placeholder="PIN CODE">
        <button id="joinBtn" onclick="updateSeat(-1)">I'M IN THE ROOM</button>
    </div>

    <div id="successArea" style="display:none;">
        <div style="font-size: 3rem; margin-bottom: 10px;">✅</div>
        <div style="color: #28a745; font-weight: bold; margin-bottom: 15px;">CHECKED IN</div>
        <button id="leaveBtn" style="background: #333; color: white; box-shadow: 0 4px 0 #000;" onclick="updateSeat(1)">LEAVE ROOM</button>
    </div>

    <div id="errorMsg" style="color: red; font-size: 0.8rem; margin-top: 8px; height: 1em;"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const roomID = params.get('room');
    const pinMapping = { 'Room1': '0412', 'Room2': '9876', 'Room3': '3314', 'Room4': '4063' };
    const workerUrl = `https://seat-counter.kai-d-corre-ea2.workers.dev/?room=${roomID}`;
    
    // UI Toggle
    function setUI(checkedIn) {
        document.getElementById('entryArea').style.display = checkedIn ? 'none' : 'block';
        document.getElementById('successArea').style.display = checkedIn ? 'block' : 'none';
        document.getElementById('errorMsg').innerText = "";
    }

    async function updateSeat(delta) {
        const pinInput = document.getElementById('pinInput').value;
        const errorMsg = document.getElementById('errorMsg');

        // Only validate PIN when joining
        if (delta === -1 && pinInput !== pinMapping[roomID]) {
            errorMsg.innerText = "Invalid PIN";
            return;
        }

        try {
            // We tell the worker to add or subtract 1
            const response = await fetch(workerUrl, { 
                method: 'POST',
                body: JSON.stringify({ change: delta }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                const newVal = await response.text();
                document.getElementById('num').innerText = newVal;
                
                if (delta === -1) {
                    localStorage.setItem('checkedIn_' + roomID, 'true');
                    setUI(true);
                } else {
                    localStorage.removeItem('checkedIn_' + roomID);
                    setUI(false);
                }
            }
        } catch(e) { errorMsg.innerText = "Connection error"; }
    }

    async function refresh() {
        if (document.hidden) return;
        const res = await fetch(workerUrl);
        const val = await res.text();
        document.getElementById('num').innerText = val;
    }

    // Initialize
    if (localStorage.getItem('checkedIn_' + roomID)) { setUI(true); }
    refresh();
    setInterval(refresh, 60000);
</script>
