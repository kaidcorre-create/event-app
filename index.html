<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seat Counter</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #e5255e; font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        .card {
            position: relative;
            width: calc(100vw - 40px); max-width: 290px;
            padding: 30px 20px;
            background: white; border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-height: 340px; 
            display: flex; flex-direction: column; justify-content: center;
        }

        .refresh-container {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; color: #666; z-index: 10;
        }
        .refresh-icon {
            display: block; width: 18px; height: 18px;
            border: 2px solid #666; border-top: 2px solid transparent;
            border-radius: 50%; position: relative;
        }
        .refresh-icon::before {
            content: ''; position: absolute; top: -2px; right: -3px;
            border-top: 5px solid transparent; border-bottom: 5px solid transparent;
            border-left: 5px solid #666; transform: rotate(-45deg);
        }
        .refresh-text { font-size: 0.5rem; text-transform: uppercase; font-weight: bold; margin-top: 3px; display: block; }

  
        #num { font-size: 5rem; font-weight: 900; color: #e5255e; margin: 0; line-height: 1; }
        .text { font-size: 0.85rem; color: #333; font-weight: bold; text-transform: uppercase; margin: 5px 0 15px 0; }
        
      
        input {
            width: 90%; padding: 12px; margin-bottom: 12px;
            border: 2px solid #eee; border-radius: 12px;
            font-size: 1.1rem; text-align: center; letter-spacing: 3px; background: #f9f9f9;
        }
        button {
            background: #ffc72e; color: #000; border: none; padding: 16px; 
            width: 100%; border-radius: 18px; font-size: 1.1rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 5px 0 #d4a526;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d4a526; }

        .success-checkmark { width: 70px; height: 70px; margin: 0 auto 15px; position: relative; }
        .check-icon {
            width: 70px; height: 70px; border-radius: 50%;
            border: 5px solid #4CAF50; position: relative;
        }
        .check-icon::after {
            content: ''; position: absolute;

            top: 32px; left: 14px; 
            width: 16px; height: 32px;
            border-right: 6px solid #4CAF50;
            border-bottom: 6px solid #4CAF50;
            transform: rotate(45deg);
            transform-origin: left top;
            animation: check-draw 0.5s ease forwards;
        }
        @keyframes check-draw {
            0% { height: 0; width: 0; }
            40% { height: 0; width: 16px; }
            100% { height: 32px; width: 16px; }
        }

        #splashArea { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .splash-icon { font-size: 2.5rem; background: #fdf2f5; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; color: #e5255e; }
    </style>
</head>
<body>

<div class="card" id="cardContent">
    <div class="refresh-container" id="refreshUI" style="display:none;" onclick="refresh()">
        <span class="refresh-icon"></span>
        <span class="refresh-text">Refresh</span>
    </div>

    <div id="splashArea">
        <div class="splash-icon">💺</div>
        <h2 style="font-size: 1.2rem; margin: 5px 0;">Workshop Seats</h2>
        <p style="font-size: 0.8rem; color: #777; margin-bottom: 10px;">Check live availability</p>
        <button id="splashBtn" style="background:#e5255e; color:white; box-shadow:0 5px 0 #b01a46;" onclick="initApp()">SHOW LIVE SEATS</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div id="num">--</div>
        <div class="text">Seats Available</div>
        
        <div id="entryArea">
            <input type="number" id="pinInput" placeholder="PIN">
            <button onclick="updateSeat(-1)">I'M IN THE ROOM</button>
        </div>

        <div id="successArea" style="display:none;">
            <div class="success-checkmark"><div class="check-icon"></div></div>
            <div style="color: #28a745; font-weight: 800; margin-bottom: 15px;">CHECKED IN</div>
            <button style="background: #333; color: white; box-shadow: 0 5px 0 #000;" onclick="updateSeat(1)">LEAVE ROOM</button>
        </div>
    </div>
    <div id="errorMsg" style="color: red; font-size: 0.75rem; margin-top: 10px; height: 1em;"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const roomID = params.get('room'); 
    const pinMapping = { 'Room1': '0412', 'Room2': '9876', 'Room3': '3314', 'Room4': '4063' };
    const baseRoom = roomID ? roomID.split('_')[0] : null;
    const workerUrl = `https://seat-counter.kai-d-corre-ea2.workers.dev/?room=${roomID}`;

    function initApp() {
        document.getElementById('splashArea').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('refreshUI').style.display = 'block';
        if (localStorage.getItem('checkedIn_' + roomID)) { setUI(true); } else { setUI(false); }
        refresh();
    }

    function setUI(checkedIn) {
        document.getElementById('entryArea').style.display = checkedIn ? 'none' : 'block';
        document.getElementById('successArea').style.display = checkedIn ? 'block' : 'none';
    }

    async function refresh() {
        const icon = document.querySelector('.refresh-icon');
        if(document.getElementById('mainApp').style.display === 'none' || !roomID) return;
        icon.style.transition = "transform 0.6s ease";
        icon.style.transform = "rotate(360deg)";
        try {
            const res = await fetch(workerUrl);
            const data = await res.json();
            document.getElementById('num').innerText = data.count;
        } catch(e) {}
        finally {
            setTimeout(() => { icon.style.transition = "none"; icon.style.transform = "rotate(0deg)"; }, 600);
        }
    }

    async function updateSeat(delta) {
        const pin = document.getElementById('pinInput').value;
        if (delta === -1 && pin !== pinMapping[baseRoom]) { document.getElementById('errorMsg').innerText = "Invalid PIN"; return; }
        try {
            const response = await fetch(workerUrl, { 
                method: 'POST',
                body: JSON.stringify({ change: delta }),
                headers: { 'Content-Type': 'application/json' }
            });
            if (response.ok) {
                const data = await response.json();
                document.getElementById('num').innerText = data.count;
                if (delta === -1) { localStorage.setItem('checkedIn_' + roomID, 'true'); setUI(true); }
                else { localStorage.removeItem('checkedIn_' + roomID); setUI(false); }
            }
        } catch(e) {}
    }

    if (localStorage.getItem('checkedIn_' + roomID)) { initApp(); }
    window.addEventListener('focus', refresh);
</script>

</body>
</html>
