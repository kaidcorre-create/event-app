<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Counter</title>
    <style>
        /* This sets the entire background to your Pink/Red color */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #e2185b; /* Your Pink/Red color */
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }
        .card {
            width: 80%; max-width: 300px; padding: 25px;
            background: white; /* Card stands out against the red background */
            border-radius: 24px;
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        #num { 
            font-size: 5rem; 
            font-weight: 900; 
            color: #e5255e; /* Number matches the background */
            margin: 0; 
            line-height: 1;
        }
        .text { 
            font-size: 0.9rem; 
            color: #333; 
            font-weight: bold;
            text-transform: uppercase; 
            margin: 10px 0 20px 0; 
            letter-spacing: 1px;
        }
        button {
            background: #ffc72e; /* Your Yellow color */
            color: #000;
            border: none;
            padding: 18px; 
            width: 100%; 
            border-radius: 14px;
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer;
            box-shadow: 0 4px 0 #d4a526;
            transition: all 0.1s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d4a526; }
        button:disabled { background: #e0e0e0; color: #999; box-shadow: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="num">--</div>
        <div class="text">Seats Available</div>
        <button id="btn" onclick="checkIn()">I'M IN THE ROOM</button>
    </div>

    <script>
  
        const workerUrl = 'https://seat-counter.kai-d-corre-ea2.workers.dev';

        async function refresh() {
            try {
                const res = await fetch(workerUrl);
                const val = await res.text();
                document.getElementById('num').innerText = val;
                
                if(parseInt(val) <= 0) {
                    const b = document.getElementById('btn');
                    b.disabled = true;
                    b.innerText = "ROOM FULL";
                }
            } catch(e) { console.log("Syncing..."); }
        }

        async function checkIn() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "SAVING...";
            
            try {
                await fetch(workerUrl, { method: 'POST' });
                localStorage.setItem('checkedIn', 'true');
                btn.innerText = "CONFIRMED!";
                btn.style.background = "#e5255e";
                btn.style.color = "white";
                refresh();
            } catch(e) {
                btn.disabled = false;
                btn.innerText = "TRY AGAIN";
            }
        }

        if (localStorage.getItem('checkedIn')) {
            const b = document.getElementById('btn');
            b.disabled = true;
            b.innerText = "CHECKED IN";
        }

        refresh();
        setInterval(refresh, 60000);
    </script>
</body>
</html>
