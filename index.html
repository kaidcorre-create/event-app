<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Removes scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white; 
        }
        .container {
            width: 90%; /* Forces the card to take up most of the phone width */
            max-width: 400px;
            padding: 20px;
            border: 2px solid #007bff;
            border-radius: 16px;
            text-align: center;
        }
        #num { font-size: 5rem; font-weight: 800; color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <div id="num">--</div>
    <div class="label">Seats Remaining</div>
    
    <button id="btn" onclick="checkIn()">I'm in the Room!</button>
    <div id="msg"></div>
</div>

<script>
    // 1. SET YOUR WORKER URL HERE
    const workerUrl = 'seat-counter.kai-d-corre-ea2.workers.dev';

    const numDisplay = document.getElementById('num');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    // Prevent multiple clicks from the same device using LocalStorage
    if (localStorage.getItem('checkedIn')) {
        btn.disabled = true;
        btn.innerText = "Check-in Recorded";
    }

    async function updateDisplay() {
        try {
            const res = await fetch(workerUrl);
            const count = await res.text();
            numDisplay.innerText = count;

            if (parseInt(count) <= 0) {
                btn.disabled = true;
                btn.innerText = "Room Full";
            }
        } catch (err) {
            console.error("Connection error:", err);
            msg.innerText = "Syncing...";
        }
    }

    async function checkIn() {
        btn.disabled = true;
        btn.innerText = "Processing...";
        
        try {
            // POST request triggers the subtraction in the Cloudflare Worker
            await fetch(workerUrl, { method: 'POST' });
            
            localStorage.setItem('checkedIn', 'true');
            btn.innerText = "Confirmed!";
            msg.innerText = "Welcome to the session!";
            updateDisplay();
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "Try Again";
            msg.innerText = "Connection failed.";
        }
    }

    // Initialize and set refresh interval (15 seconds to be safe)
    updateDisplay();
    setInterval(updateDisplay, 15000);
</script>

</body>
</html>
